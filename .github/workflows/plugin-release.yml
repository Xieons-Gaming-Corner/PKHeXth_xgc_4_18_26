Here’s the final workflow file. It fixes the cross-job output issue, avoids passing a temp-file path between jobs, rebuilds the release notes in the release job, uses uploaded artifacts correctly, and keeps everything on GITHUB_TOKEN only. Creating releases requires contents: write, and passing values between jobs must use explicit job outputs rather than step-local paths.

text
name: Auto-Release

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'Directory.Build.props'
      - 'PKHeX.WinForms/MainWindow/Plugins/**'
      - 'PKHeX.Core/Resources/legality/**'
      - 'wild/**'

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    outputs:
      should_release: ${{ steps.detect_changes.outputs.SHOULD_RELEASE }}
      is_version_update: ${{ steps.detect_changes.outputs.IS_VERSION_UPDATE }}
      is_legality_update: ${{ steps.detect_changes.outputs.IS_LEGALITY_UPDATE }}
      is_plugin_update: ${{ steps.detect_changes.outputs.IS_PLUGIN_UPDATE }}
      release_version: ${{ steps.release_meta.outputs.RELEASE_VERSION }}
      release_title: ${{ steps.release_meta.outputs.RELEASE_TITLE }}
      release_kind: ${{ steps.release_meta.outputs.RELEASE_KIND }}

    env:
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Get version from Directory.Build.props
        id: get_version
        shell: pwsh
        run: |
          $xml = [xml](Get-Content Directory.Build.props)
          $version = $xml.Project.PropertyGroup.Version
          "VERSION=$version" >> $env:GITHUB_OUTPUT
          Write-Host "Version: $version"

      - name: Detect relevant changes
        id: detect_changes
        shell: pwsh
        run: |
          $changedFiles = git diff --name-only HEAD~1 HEAD

          $isVersionUpdate = $false
          $isLegalityUpdate = $false
          $isPluginUpdate = $false
          $shouldRelease = $false

          foreach ($file in $changedFiles) {
            if ($file -eq 'Directory.Build.props') {
              $isVersionUpdate = $true
              $shouldRelease = $true
            }
            if ($file -match 'PKHeX\.Core/Resources/legality/' -or $file -match '^wild/') {
              $isLegalityUpdate = $true
              $shouldRelease = $true
            }
            if ($file -match 'PKHeX\.WinForms/MainWindow/Plugins/') {
              $isPluginUpdate = $true
              $shouldRelease = $true
            }
          }

          "SHOULD_RELEASE=$shouldRelease" >> $env:GITHUB_OUTPUT
          "IS_VERSION_UPDATE=$isVersionUpdate" >> $env:GITHUB_OUTPUT
          "IS_LEGALITY_UPDATE=$isLegalityUpdate" >> $env:GITHUB_OUTPUT
          "IS_PLUGIN_UPDATE=$isPluginUpdate" >> $env:GITHUB_OUTPUT

          Write-Host "Should release: $shouldRelease"
          Write-Host "Version update: $isVersionUpdate"
          Write-Host "Legality update: $isLegalityUpdate"
          Write-Host "Plugin update: $isPluginUpdate"

      - name: Determine release version
        id: release_meta
        if: steps.detect_changes.outputs.SHOULD_RELEASE == 'True'
        shell: pwsh
        run: |
          $baseVersion = "${{ steps.get_version.outputs.VERSION }}"
          $releaseTags = @(gh release list --limit 200 --json tagName --jq '.[].tagName')

          $baseTag1 = $baseVersion
          $baseTag2 = "v$baseVersion"

          $baseVersionExists = $releaseTags -contains $baseTag1 -or $releaseTags -contains $baseTag2
          $latestRevision = 0

          foreach ($tag in $releaseTags) {
            if ($tag -match "^(?:v)?$([regex]::Escape($baseVersion))-rev\.(\d+)$") {
              $revision = [int]$matches[1]
              if ($revision -gt $latestRevision) {
                $latestRevision = $revision
              }
            }
          }

          $isVersionUpdate = "${{ steps.detect_changes.outputs.IS_VERSION_UPDATE }}"
          $isLegalityUpdate = "${{ steps.detect_changes.outputs.IS_LEGALITY_UPDATE }}"
          $isPluginUpdate = "${{ steps.detect_changes.outputs.IS_PLUGIN_UPDATE }}"

          if ($isVersionUpdate -eq "True" -and -not $baseVersionExists) {
            $releaseVersion = $baseVersion
            $releaseKind = "base"
            Write-Host "Creating new base release: $releaseVersion"
          }
          elseif ($baseVersionExists) {
            $newRevision = $latestRevision + 1
            $releaseVersion = "$baseVersion-rev.$newRevision"
            if ($isLegalityUpdate -eq "True") {
              $releaseKind = "legality"
            }
            elseif ($isPluginUpdate -eq "True") {
              $releaseKind = "plugin"
            }
            else {
              $releaseKind = "revision"
            }
            Write-Host "Creating revision release: $releaseVersion"
          }
          else {
            $releaseVersion = $baseVersion
            $releaseKind = "base"
            Write-Host "Creating initial release: $releaseVersion"
          }

          if ($releaseKind -eq "legality") {
            $releaseTitle = "v$releaseVersion - Legality Update"
          }
          elseif ($releaseKind -eq "plugin") {
            $releaseTitle = "v$releaseVersion - Plugin Update"
          }
          else {
            $releaseTitle = "v$releaseVersion"
          }

          "RELEASE_VERSION=$releaseVersion" >> $env:GITHUB_OUTPUT
          "RELEASE_TITLE=$releaseTitle" >> $env:GITHUB_OUTPUT
          "RELEASE_KIND=$releaseKind" >> $env:GITHUB_OUTPUT

          Write-Host "Final release version: $releaseVersion"
          Write-Host "Release title: $releaseTitle"
          Write-Host "Release kind: $releaseKind"

      - name: Restore dependencies
        if: steps.detect_changes.outputs.SHOULD_RELEASE == 'True'
        run: dotnet restore PKHeX.sln

      - name: Publish project
        if: steps.detect_changes.outputs.SHOULD_RELEASE == 'True'
        run: >
          dotnet publish PKHeX.WinForms/PKHeX.WinForms.csproj
          --configuration Release
          --runtime win-x64
          --self-contained false
          -p:PublishSingleFile=true
          -p:PublishReadyToRun=true
          -p:IncludeAllContentForSelfExtract=true
          --output publish

      - name: Verify build outputs
        if: steps.detect_changes.outputs.SHOULD_RELEASE == 'True'
        shell: pwsh
        run: |
          if (-not (Test-Path "publish/PKHeX.exe")) {
            throw "PKHeX.exe not found in publish/PKHeX.exe"
          }

          if (-not (Test-Path "PKHeX.Core/bin/Release/net9.0/PKHeX.Core.dll")) {
            throw "PKHeX.Core.dll not found in PKHeX.Core/bin/Release/net9.0/PKHeX.Core.dll"
          }

      - name: Upload artifacts
        if: steps.detect_changes.outputs.SHOULD_RELEASE == 'True'
        uses: actions/upload-artifact@v4
        with:
          name: release-assets
          path: |
            publish/PKHeX.exe
            PKHeX.Core/bin/Release/net9.0/PKHeX.Core.dll
          if-no-files-found: error
          retention-days: 7

  release:
    runs-on: windows-latest
    needs: build
    if: needs.build.outputs.should_release == 'True'
    permissions:
      contents: write

    env:
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-assets
          path: release-assets

      - name: Create release notes
        id: notes
        shell: pwsh
        run: |
          $releaseKind = "${{ needs.build.outputs.release_kind }}"
          $releaseVersion = "${{ needs.build.outputs.release_version }}"
          $notesPath = Join-Path $env:RUNNER_TEMP "release_notes.md"

          if ($releaseKind -eq "legality") {
            $releaseNotes = @"
## Legality Database Update

- Updated legality resources
- PKHeX.exe has been updated
- PKHeX.Core.dll has been updated

*This is a revision release for legality updates.*
"@
          }
          elseif ($releaseKind -eq "plugin") {
            $releaseNotes = @"
## Plugin Updates

- Updated plugin resources
- PKHeX.exe has been updated
- PKHeX.Core.dll has been updated

*This is a revision release for plugin updates.*
"@
          }
          else {
            $releaseNotes = @"
## Release v$releaseVersion

- PKHeX.exe has been updated
- PKHeX.Core.dll has been updated

*New version release.*
"@
          }

          $releaseNotes | Out-File -FilePath $notesPath -Encoding utf8
          "NOTES_PATH=$notesPath" >> $env:GITHUB_OUTPUT

      - name: Create release
        shell: pwsh
        run: |
          $version = "${{ needs.build.outputs.release_version }}"
          $title = "${{ needs.build.outputs.release_title }}"
          $notesPath = "${{ steps.notes.outputs.NOTES_PATH }}"

          Write-Host "Creating new release $version"

          gh release create $version `
            "release-assets/PKHeX.exe" `
            "release-assets/PKHeX.Core.dll" `
            --title "$title" `
            --notes-file "$notesPath"
